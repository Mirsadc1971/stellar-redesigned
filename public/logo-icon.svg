<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Stellar Property Management">
  <title>Stellar Property Management</title>
  <!-- ground shadow -->
  <ellipse cx="31" cy="46.4" rx="20.5" ry="2.5" fill="#1b4d77" opacity="0.12"/>
  <!-- orbit ring: back half (behind buildings) -->
  <path d="M 5.628 40.234 A 27 11.5 -20 0 1 56.372 21.766"
        fill="none" stroke="#1b4d77" stroke-width="3.4" stroke-linecap="round"/>
  <!-- buildings -->
  <rect x="18" y="28" width="7" height="17.2" rx="1.6" fill="#9a9ca0"/>
  <rect x="37.4" y="23" width="7" height="22.2" rx="1.6" fill="#6f8ca0"/>
  <rect x="27" y="12" width="8.4" height="33.2" rx="1.9" fill="#3a9fd4"/>
  <!-- window slivers on the tall tower -->
  <rect x="30.4" y="16.5" width="1.7" height="22" rx="0.85" fill="#ffffff" opacity="0.32"/>
  <!-- orbit ring: front half (in front of buildings) -->
  <path d="M 56.372 21.766 A 27 11.5 -20 0 1 5.628 40.234"
        fill="none" stroke="#1b4d77" stroke-width="3.4" stroke-linecap="round"/>
  <!-- stellar spark -->
  <path d="M 48 13 L 49.1 16 L 52 17.1 L 49.1 18.2 L 48 21.2 L 46.9 18.2 L 44 17.1 L 46.9 16 Z" fill="#3a9fd4"/>
</svg>
